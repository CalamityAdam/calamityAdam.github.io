<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adam Sisk</title>
  <meta name="description" content="Adam Sisk. I make things on the internet.">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">

  <link rel="preload" as="image"
        imagesrcset="./assets/adam-headshot-512.webp 512w, ./assets/adam-headshot.webp 1024w"
        imagesizes="(max-width: 720px) 60vw, 260px"
        type="image/webp"
        fetchpriority="high">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <svg class="grain" aria-hidden="true" focusable="false">
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix values="0 0 0 0 0.18
                             0 0 0 0 0.13
                             0 0 0 0 0.10
                             0 0 0 0.10 0" />
    </filter>
    <rect width="100%" height="100%" filter="url(#grain)" />
  </svg>

  <main class="page">
    <section class="hero">
      <div class="intro">
        <h1 class="name">hi i'm <strong>adam sisk</strong> i make things on the internet</h1>

        <nav class="links" aria-label="Primary">
          <a class="chip" href="mailto:adamsisk91@gmail.com?subject=Hi%20Adam">say hi</a>
          <a class="chip" href="./artifacts/">artifacts</a>
          <a class="chip" href="https://github.com/CalamityAdam">github</a>
        </nav>
      </div>

      <div class="portrait">
        <picture>
          <source
            type="image/webp"
            srcset="./assets/adam-headshot-512.webp 512w, ./assets/adam-headshot.webp 1024w"
            sizes="(max-width: 720px) 60vw, 260px">
          <img
            src="./assets/adam-headshot.jpg"
            srcset="./assets/adam-headshot-512.jpg 512w, ./assets/adam-headshot.jpg 1024w"
            sizes="(max-width: 720px) 60vw, 260px"
            alt="Adam Sisk"
            width="1024" height="1024"
            loading="eager" decoding="async" fetchpriority="high">
        </picture>
      </div>
    </section>
  </main>

  <footer class="foot">
    <a href="https://github.com/CalamityAdam/calamityAdam.github.io">view source</a>
  </footer>

  <script src="./index.js"></script>
</body>

</html>
